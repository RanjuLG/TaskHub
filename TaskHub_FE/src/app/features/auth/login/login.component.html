<div class="auth-shell auth-shell--login">
  <div class="auth-card rounded-4xl">
    
    <div class="mb-8 text-center">
      <div class="auth-brand">
        <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
        </svg>
      </div>
      <h1 class="auth-title">Welcome to TaskHub</h1>
      <p class="auth-subtitle">Sign in to manage your tasks efficiently.</p>
    </div>

    <app-warning-banner [message]="warningMessage()" title="Sign in issue" />
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div>
        <label for="username" class="auth-label">Username</label>
        <div class="relative">
          <div class="auth-input-icon">
            <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <input 
            type="text" 
            id="username" 
            formControlName="username" 
            placeholder="Enter your username"
            class="auth-input"
            [class.border-rose-300]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            [class.ring-rose-100]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          />
        </div>
        <app-validation-message [control]="loginForm.get('username')" [messages]="{ required: 'Username is required' }" />
      </div>

      <div>
        <label for="password" class="auth-label">Password</label>
        <div class="relative">
          <div class="auth-input-icon">
            <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            class="auth-input"
            [class.border-rose-300]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            [class.ring-rose-100]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
        </div>
        <app-validation-message [control]="loginForm.get('password')" [messages]="{ required: 'Password is required' }" />
      </div>

      <div class="pt-2">
        <button 
          type="submit" 
          class="auth-button"
        >
          Sign in to your account
        </button>
      </div>

      <p class="auth-footer">
        New here?
        <a routerLink="/signup" class="auth-link">
          Create an account
        </a>
      </p>
    </form>
  </div>
</div>
